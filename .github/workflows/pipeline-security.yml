# .github/workflows/pipeline-security.yml
# Example GitHub Actions pipeline for security

name: Pipeline Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (static code analysis)
        run: bandit -r .

      - name: Run Safety (dependency vulnerability check)
        run: safety check

      - name: Check for secrets in environment
        run: |
          if [ -z "$API_KEY" ]; then
            echo "API_KEY not set!" && exit 1
          fi
          echo "API_KEY is set."
